backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "images"

collections:
  - name: "contenido"
    label: "Contenido de la Web"
    files:
      - file: "datos.json"
        label: "Textos y Configuración"
        name: "configuracion"
        fields:
          - label: "Textos de la Web"
            name: "textos"
            widget: "object"
            fields:
              - { label: "Título Principal", name: "hero_titulo", widget: "string" }
              - { label: "Subtítulo Principal", name: "hero_subtitulo", widget: "text" }
              - { label: "Título Nosotros", name: "nosotros_titulo", widget: "string" }
              - { label: "Descripción 1 Nosotros", name: "nosotros_descripcion_1", widget: "text" }
              - { label: "Descripción 2 Nosotros", name: "nosotros_descripcion_2", widget: "text" }