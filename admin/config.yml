backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "images"

collections:
  - name: "contenido"
    label: "Contenido de la Web"
    files:
      - file: "datos.json"
        label: "Textos y Configuración General"
        name: "configuracion"
        fields:
          # --- TEXTOS GENERALES ---
          - label: "Textos Principales"
            name: "textos"
            widget: "object"
            fields:
              - { label: "Título Principal (Hero)", name: "hero_titulo", widget: "string" }
              - { label: "Subtítulo Principal (Hero)", name: "hero_subtitulo", widget: "text" }
              - { label: "Título Nosotros", name: "nosotros_titulo", widget: "string" }
              - { label: "Descripción 1 Nosotros", name: "nosotros_descripcion_1", widget: "text" }
              - { label: "Descripción 2 Nosotros", name: "nosotros_descripcion_2", widget: "text" }

          # --- CONTACTO ---
          - label: "Datos de Contacto"
            name: "contacto"
            widget: "object"
            fields:
              - { label: "Teléfono (WhatsApp)", name: "telefono", widget: "string" }
              - { label: "Usuario de Instagram", name: "instagram", widget: "string" }
              - { label: "Correo Electrónico", name: "email", widget: "string" }

         # --- SECCIÓN DE SERVICIOS ---
          - label: "Sección de Servicios"
            name: "servicios"
            widget: "list"
            fields:
              - { label: "Título de la Categoría", name: "titulo", widget: "string" }
              
              # MENÚ DESPLEGABLE CON ÍCONOS MECÁNICOS PREDEFINIDOS
              - label: "Ícono de Cabecera"
                name: "icono"
                widget: "select"
                options:
                  - { label: "🔧 Llave Inglesa (Mecánica General)", value: "wrench" }
                  - { label: "⚙️ Engranaje / Tuerca (Sistemas)", value: "settings" }
                  - { label: "🛞 Disco de Freno (Frenos / Tren D.)", value: "disc" }
                  - { label: "🔋 Batería (Electricidad)", value: "battery-charging" }
                  - { label: "💻 Escáner / CPU (Electrónica)", value: "cpu" }
                  - { label: "🛡️ Escudo / Inspección", value: "shield-check" }
                  - { label: "🚚 Camión / Flotas", value: "truck" }
                  - { label: "📈 Diagnóstico DPF / Motor", value: "activity" }
                default: "wrench"

              - label: "Estilo del Ícono"
                name: "color_clase"
                widget: "select"
                options:
                  - { label: "Fondo Verde Eco", value: "green" }
                  - { label: "Fondo Azul Técnico", value: "blue" }
                  - { label: "Fondo Gris Neutro", value: "" }
                default: "green"

              - { label: "¿Tarjeta Destacada (Borde Verde)?", name: "destacado", widget: "boolean", default: false }

              - label: "Lista de Puntos/Servicios"
                name: "items"
                widget: "list"
                field: { label: "Servicio u Opción", name: "item", widget: "string" }

          # --- TRABAJOS ---
          - label: "Galería de Trabajos"
            name: "trabajos"
            widget: "list"
            fields:
              - { label: "Título del Trabajo", name: "titulo", widget: "string" }
              - { label: "Categoría", name: "categoria", widget: "string" }
              - { label: "Descripción", name: "descripcion", widget: "text" }
              - { label: "Imagen", name: "imagen", widget: "image" }