backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "images"

collections:
  - name: "contenido"
    label: "Contenido de la Web"
    files:
      - file: "datos.json"
        label: "Textos y Configuración General"
        name: "configuracion"
        fields:
          # --- TEXTOS GENERALES ---
          - label: "Textos Principales"
            name: "textos"
            widget: "object"
            fields:
              - { label: "Título Principal (Hero)", name: "hero_titulo", widget: "string" }
              - { label: "Subtítulo Principal (Hero)", name: "hero_subtitulo", widget: "text" }
              - { label: "Título Nosotros", name: "nosotros_titulo", widget: "string" }
              - { label: "Descripción 1 Nosotros", name: "nosotros_descripcion_1", widget: "text" }
              - { label: "Descripción 2 Nosotros", name: "nosotros_descripcion_2", widget: "text" }

          # --- CONTACTO ---
          - label: "Datos de Contacto"
            name: "contacto"
            widget: "object"
            fields:
              - { label: "Teléfono (WhatsApp)", name: "telefono", widget: "string" }
              - { label: "Usuario de Instagram", name: "instagram", widget: "string" }
              - { label: "Correo Electrónico", name: "email", widget: "string" }

          # --- SERVICIOS ---
          - label: "Sección de Servicios"
            name: "servicios"
            widget: "list"
            fields:
              - { label: "Nombre de la Categoría/Servicio", name: "titulo", widget: "string" }
              - { label: "Nombre del Icono (Lucide: activity, wrench, shield, cpu, etc.)", name: "icono", widget: "string", default: "wrench" }
              - { label: "Color del Icono (opciones: green, blue, o dejar vacío)", name: "color_clase", widget: "string", required: false }
              - { label: "¿Tarjeta Destacada?", name: "destacado", widget: "boolean", default: false }
              - label: "Lista de Puntos/Servicios"
                name: "items"
                widget: "list"
                field: { label: "Servicio", name: "item", widget: "string" }

          # --- TRABAJOS ---
          - label: "Galería de Trabajos"
            name: "trabajos"
            widget: "list"
            fields:
              - { label: "Título del Trabajo", name: "titulo", widget: "string" }
              - { label: "Categoría", name: "categoria", widget: "string" }
              - { label: "Descripción", name: "descripcion", widget: "text" }
              - { label: "Imagen", name: "imagen", widget: "image" }